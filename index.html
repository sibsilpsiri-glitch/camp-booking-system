<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองที่นอนค่ายอาสา | มหาวิทยาลัยช่อแก้ว</title>
    
    <!-- Google Fonts: Prompt -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- SweetAlert2 สำหรับ Popup กรอกข้อมูล -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Firebase SDK (อิมพอร์ตแบบ Module) -->
    <script type="module" src="app.js" defer></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-800 antialiased min-h-screen flex flex-col items-center py-10">

    <header class="text-center mb-8 w-full max-w-4xl px-4">
        <h1 class="text-3xl font-semibold text-gray-900 tracking-tight">ระบบจองที่พัก ค่ายอาสา</h1>
        <p class="text-gray-500 mt-2">อาคารศูนย์ประชุม มหาวิทยาลัยช่อแก้ว</p>
        
        <div class="flex justify-center gap-6 mt-6 text-sm">
            <div class="flex items-center gap-2"><div class="w-4 h-4 bg-blue-100 border border-blue-300 rounded"></div> ว่าง (ชาย)</div>
            <div class="flex items-center gap-2"><div class="w-4 h-4 bg-pink-100 border border-pink-300 rounded"></div> ว่าง (หญิง)</div>
            <div class="flex items-center gap-2"><div class="w-4 h-4 bg-gray-400 rounded"></div> ถูกจองแล้ว</div>
        </div>
    </header>

    <!-- Map Container -->
    <main class="relative bg-white shadow-xl rounded-xl p-8 border border-gray-200 w-full max-w-[1200px] overflow-x-auto">
        <!-- ประตู -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white px-4 py-1 text-xs font-medium border-2 border-gray-300 text-gray-500 rounded-sm">ประตูหน้า</div>
        <div class="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 bg-white px-4 py-1 text-xs font-medium border-2 border-gray-300 text-gray-500 rounded-sm">ประตูหลัง</div>
        <div class="absolute top-1/2 left-0 -translate-x-1/2 -translate-y-1/2 bg-white px-1 py-4 text-xs font-medium border-2 border-gray-300 text-gray-500 rounded-sm writing-vertical">ประตูซ้าย</div>
        <div class="absolute top-1/2 right-0 translate-x-1/2 -translate-y-1/2 bg-white px-1 py-4 text-xs font-medium border-2 border-gray-300 text-gray-500 rounded-sm writing-vertical">ประตูขวา</div>

        <!-- แผนผังที่นอน -->
        <div class="flex flex-col md:flex-row gap-8 justify-center items-stretch min-w-[800px]">
            
            <!-- โซนผู้ชาย 230 ที่ -->
            <div class="flex-1">
                <h2 class="text-center font-medium text-blue-700 mb-4 border-b border-blue-200 pb-2">โซนชาย (230 ที่)</h2>
                <div id="male-zone" class="spot-grid"></div>
            </div>

            <!-- เส้นแบ่งโซน -->
            <div class="hidden md:block w-px bg-dashed bg-gray-300 relative">
                <div class="absolute top-1/2 -translate-y-1/2 bg-white text-gray-400 text-xs py-2 px-1 rounded-full border border-gray-200">ทางเดิน</div>
            </div>

            <!-- โซนผู้หญิง 160 ที่ -->
            <div class="flex-1">
                <h2 class="text-center font-medium text-pink-700 mb-4 border-b border-pink-200 pb-2">โซนหญิง (160 ที่)</h2>
                <div id="female-zone" class="spot-grid"></div>
            </div>

        </div>
    </main>

    <footer class="mt-12 text-sm text-gray-400">
        &copy; 2026 มหาวิทยาลัยช่อแก้ว. สงวนลิขสิทธิ์
    </footer>

</body>
</html>
